name: ReCall
options:
  bundleIdPrefix: app.understood
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 7FKUS5M5QS
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  ReCall:
    type: application
    platform: iOS
    sources:
      - path: ReCall/App
      - path: ReCall/Resources
      # Folder reference: the entire Web/ tree (index.html + covers/*.png) is
      # copied into the bundle preserving its relative layout so the prototype
      # loads offline.
      - path: ReCall/Web
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.understood.recall
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Notorious Recall
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    postBuildScripts:
      - name: Stamp web bundle fingerprint
        basedOnDependencyAnalysis: false
        script: |
          set -e
          WEB_DST="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Web/index.html"
          [ -f "$WEB_DST" ] || { echo "error: bundled web missing at $WEB_DST"; exit 1; }
          SRC_MD5=$(cd "$SRCROOT/ReCall/Web" && find . -type f ! -name ".*" | sort | xargs cat | md5 -q)
          GIT_SHA=$(cd "$SRCROOT/.." && git rev-parse --short HEAD 2>/dev/null || echo unknown)
          DIRTY=""
          (cd "$SRCROOT/.." && [ -n "$(git status --porcelain 2>/dev/null)" ]) && DIRTY="*"
          sed -i '' "s/__SRC_MD5__/$SRC_MD5/g; s/__BUILD_SHA__/$GIT_SHA$DIRTY/g" "$WEB_DST"
          xattr -cr "$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME" || true
          echo "stamped web bundle: sha=$GIT_SHA$DIRTY md5=$SRC_MD5"

  ReCallUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReCallUITests
    dependencies:
      - target: ReCall
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.understood.recall.uitests
        TEST_TARGET_NAME: ReCall

schemes:
  ReCall:
    build:
      targets:
        ReCall: all
        ReCallUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReCallUITests
