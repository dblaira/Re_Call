name: ReCall
options:
  bundleIdPrefix: app.understood
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 7FKUS5M5QS
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  ReCall:
    type: application
    platform: iOS
    sources:
      - path: ReCall/App
      - path: ReCall/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.understood.recall
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Notorious Recall
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Re_Call uses your location to tag a reminder with where it matters."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Re_Call attaches photos you choose to your reminders."
  ReCallUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ReCallUITests
    dependencies:
      - target: ReCall
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.understood.recall.uitests
        TEST_TARGET_NAME: ReCall

schemes:
  ReCall:
    build:
      targets:
        ReCall: all
        ReCallUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReCallUITests
