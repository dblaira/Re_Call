<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Re_Call</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f4ef;
        color: #1d1b18;
      }

      main {
        width: min(680px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 40px;
        line-height: 1.05;
      }

      p {
        margin: 0 0 18px;
        font-size: 18px;
        line-height: 1.5;
      }

      code {
        padding: 3px 6px;
        border-radius: 6px;
        background: #ebe3d8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Re_Call</h1>
      <p>A deterministic recommendation layer for reminders that go deeper, not broader.</p>
      <p>API health: <code>/api/health</code></p>
      <p>Recommendation endpoint: <code>POST /api/recommendations</code></p>
    </main>
  </body>
</html>
